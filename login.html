<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Product Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Product Tracker</div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="dashboard.html" id="dashboardLink" style="display: none;">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <!-- Authentication Section -->
    <section class="auth">
        <div class="container">
            <h2>Authentication</h2>
            
            <!-- Login Form -->
            <div class="auth-form" id="loginForm">
                <h3>Login</h3>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="auth-button">Login</button>
                    <p class="auth-switch">Don't have an account? <a href="#" id="showRegister">Register</a></p>
                    <p class="error-message" id="loginError"></p>
                </form>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="registerForm" style="display: none;">
                <h3>Register</h3>
                <p class="auth-hint">Registration is limited to approved institutional emails (e.g. <strong>name@fau.edu</strong>).</p>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="registerUsername">Username:</label>
                        <input type="text" id="registerUsername" required placeholder="Choose a username">
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password:</label>
                        <input type="password" id="registerPassword" required placeholder="Create a password">
                    </div>

                    <button type="submit" class="auth-button">Register</button>
                    <p class="auth-switch">Already have an account? <a href="#" id="showLogin">Login</a></p>
                    <p class="error-message" id="registerError"></p>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Product Tracker. All rights reserved.</p>
        </div>
    </footer>

    <!-- Supabase client library (must load before our config + auth code) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
